name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Trill needs the macOS 26 (Tahoe) SDK: BetterSwiftAX references AX constants
# (kAXARIA*, kAXDOM*, …) that only exist in HIServices' AXWebConstants.h, a
# file the macOS 15 SDK doesn't ship — so builds on macos-15 fail with ~160
# "cannot find 'kAX…' in scope" errors. Build on the macos-26 image and pin
# Xcode 26.2 (matches the dev machine; the image's default drifts to newer
# 26.x). Runner catalogue: https://github.com/actions/runner-images.
env:
  DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer

jobs:
  build:
    name: xcodebuild (macOS)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: xcodebuild -version && swift --version
      - name: Build
        # -skipMacroValidation: the pinned platform-imessage package ships a
        # build macro (PlatformSDKMacros) whose trust prompt can't be answered
        # unattended. CODE_SIGNING_ALLOWED=NO: CI has no signing identity.
        run: |
          xcodebuild \
            -project Trill.xcodeproj \
            -scheme Trill \
            -configuration Debug \
            -destination 'platform=macOS' \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            build

  test:
    name: unit tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: |
          xcodebuild \
            -project Trill.xcodeproj \
            -scheme Trill \
            -configuration Debug \
            -destination 'platform=macOS' \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            test
