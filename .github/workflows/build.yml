name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: xcodebuild (macOS)
    # Trill needs Xcode 26.2 / Swift 6.2 — use the newest runner image and its
    # default (latest) Xcode. If the image's default lags, pin with
    # `sudo xcode-select -s /Applications/Xcode_26.2.app` here.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: xcodebuild -version && swift --version
      - name: Build
        # -skipMacroValidation: the pinned platform-imessage package ships a
        # build macro (PlatformSDKMacros) whose trust prompt can't be answered
        # unattended. CODE_SIGNING_ALLOWED=NO: CI has no signing identity.
        run: |
          xcodebuild \
            -project Trill.xcodeproj \
            -scheme Trill \
            -configuration Debug \
            -destination 'platform=macOS' \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            build

  test:
    name: unit tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: |
          xcodebuild \
            -project Trill.xcodeproj \
            -scheme Trill \
            -configuration Debug \
            -destination 'platform=macOS' \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            test
