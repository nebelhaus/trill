name: release

# Tag v<date> (CalVer, e.g. v2026.07.18) -> build Trill.app -> GitHub release
# with a zipped bundle ->
# Homebrew cask bump. Cut tags with `bench release trill` from the workshop;
# it enforces that the tag matches VERSION and that everything is pushed.
#
# The app is signed with our Developer ID (hardened runtime) and notarized by
# Apple, so it opens straight from the cask with no Gatekeeper prompt. VERSION is
# the single source of truth: it names the tag and is injected as MARKETING_VERSION
# at build time.
#
# Signing/notarization secrets (set once, per repo):
#   MACOS_CERT_P12       base64 of the exported "Developer ID Application" .p12
#   MACOS_CERT_PASSWORD  the password protecting that .p12
#   NOTARY_KEY_P8        base64 of the App Store Connect API key (.p8)
#   NOTARY_KEY_ID        that key's Key ID
#   NOTARY_ISSUER_ID     the App Store Connect issuer ID

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: build + publish release
    # macos-26 + Xcode 26.2: BetterSwiftAX needs the macOS 26 (Tahoe) SDK's
    # AXWebConstants.h (the kAX* constants), absent from macos-15 — see build.yml.
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - name: Check the tag matches VERSION
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if [ "v$VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "tag $GITHUB_REF_NAME != VERSION $VERSION — bump VERSION or retag" >&2
            exit 1
          fi

      - name: Import Developer ID signing certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          echo "$MACOS_CERT_P12" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -P "$MACOS_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          # Let codesign/xcodebuild use the key non-interactively.
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Put our keychain first on the search list so the identity resolves.
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build Release Trill.app (Developer ID, hardened runtime)
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          xcodebuild \
            -project Trill.xcodeproj \
            -scheme Trill \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath dd \
            -skipMacroValidation \
            MARKETING_VERSION="$VERSION" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="88M28542LQ" \
            CODE_SIGNING_ALLOWED=YES \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            build

      - name: Re-sign with Developer ID (hardened runtime, clean entitlements)
        run: |
          # Explicit re-sign so notarization can't trip on an xcodebuild quirk:
          # guarantees the hardened runtime, a secure timestamp, and exactly the
          # apple-events entitlement (no get-task-allow, which notarization rejects).
          APP="dd/Build/Products/Release/Trill.app"
          IDENTITY="$(security find-identity -v -p codesigning "$RUNNER_TEMP/signing.keychain-db" \
            | awk -F'"' '/Developer ID Application/{print $2; exit}')"
          echo "signing with: $IDENTITY"
          codesign --force --options runtime --timestamp \
            --entitlements Trill/Config/Trill.entitlements \
            --sign "$IDENTITY" \
            "$APP"
          codesign --verify --strict --verbose=2 "$APP"

      - name: Notarize + staple
        env:
          NOTARY_KEY_P8: ${{ secrets.NOTARY_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          APP="dd/Build/Products/Release/Trill.app"
          echo "$NOTARY_KEY_P8" | base64 -d > "$RUNNER_TEMP/notary.p8"
          CREDS=(--key "$RUNNER_TEMP/notary.p8" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID")
          # notarytool needs an archive; this zip is only for submission.
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$RUNNER_TEMP/notarize.zip"
          # `submit --wait` exits 0 even when the verdict is Invalid, so check the
          # status ourselves and dump Apple's per-file reasons before failing.
          JSON="$(xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" "${CREDS[@]}" --wait --output-format json)"
          echo "$JSON"
          read -r ID STATUS < <(echo "$JSON" | python3 -c 'import sys,json;d=json.load(sys.stdin);print(d.get("id",""),d.get("status",""))')
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::notarization $STATUS — Apple's log:"
            xcrun notarytool log "$ID" "${CREDS[@]}" || true
            exit 1
          fi
          # Staple the ticket onto the .app so it verifies offline.
          xcrun stapler staple "$APP"
          rm -f "$RUNNER_TEMP/notary.p8"

      - name: Zip the stapled bundle
        run: |
          mkdir -p dist
          # Zip AFTER stapling — the submitted zip above has no ticket.
          ditto -c -k --sequesterRsrc --keepParent \
            "dd/Build/Products/Release/Trill.app" \
            "dist/trill-$GITHUB_REF_NAME-macos.zip"

      - name: Verify signature + notarization
        run: |
          APP="dd/Build/Products/Release/Trill.app"
          codesign --verify --deep --strict --verbose=2 "$APP"
          spctl -a -vvv -t exec "$APP"

      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

  bump-tap:
    name: bump nebelhaus/homebrew-tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: nebelhaus/homebrew-tap
          # Write deploy key for the tap repo, stored as a secret here. The
          # cask's version/sha lines are CI-owned; humans never bump them.
          ssh-key: ${{ secrets.TAP_DEPLOY_KEY }}

      - name: Point Casks/trill.rb at the new release
        run: |
          TAG="$GITHUB_REF_NAME"
          VER="${TAG#v}"
          curl -fsSL --retry 5 --retry-delay 5 -o /tmp/trill.zip \
            "https://github.com/nebelhaus/trill/releases/download/$TAG/trill-$TAG-macos.zip"
          SHA="$(sha256sum /tmp/trill.zip | cut -d' ' -f1)"
          sed -i -E \
            -e "s#^  version \".*\"#  version \"$VER\"#" \
            -e "s#^  sha256 \".*\"#  sha256 \"$SHA\"#" \
            Casks/trill.rb
          if git diff --quiet; then
            echo "cask already current"
            exit 0
          fi
          git config user.name "haus-release[bot]"
          git config user.email "haus-release@users.noreply.github.com"
          git commit -am "trill ${VER}"
          git push

  bump-flake:
    name: bump nix/release.nix
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Trill is also a flake input of the rice (nebelhaus/nebelhaus), which
      # installs the app through Nix instead of Homebrew. That flake wraps this
      # release ZIP, pinned by version + sha256 in nix/release.nix — the exact
      # same pair the cask carries. Keep the two in lockstep: rewrite the pin on
      # main so a downstream `bench ship` ripples the new release into the rice's
      # lock. The version/sha lines are CI-owned; humans never bump them.
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Point nix/release.nix at the new release
        run: |
          TAG="$GITHUB_REF_NAME"
          VER="${TAG#v}"
          curl -fsSL --retry 5 --retry-delay 5 -o /tmp/trill.zip \
            "https://github.com/nebelhaus/trill/releases/download/$TAG/trill-$TAG-macos.zip"
          SHA="$(sha256sum /tmp/trill.zip | cut -d' ' -f1)"
          sed -i -E \
            -e "s#^  version = \".*\";#  version = \"$VER\";#" \
            -e "s#^  sha256 = \".*\";#  sha256 = \"$SHA\";#" \
            nix/release.nix
          if git diff --quiet; then
            echo "nix/release.nix already current"
            exit 0
          fi
          git config user.name "haus-release[bot]"
          git config user.email "haus-release@users.noreply.github.com"
          git commit -am "trill ${VER} (nix release pin)"
          git push
